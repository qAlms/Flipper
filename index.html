<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Advisor - Full Screen Wireframe</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --panel-bg: #1e293b;
      --panel-border: #334155;
      --accent-gold: #f59e0b;
      --accent-gold-hover: #d97706;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-dark);
      color: var(--text-main);
    }

    .wireframe-container {
      width: 100vw;
      height: 100vh;
      background-color: var(--panel-bg);
      display: grid;
      grid-template-areas: 
        "header header"
        "sidebar main-cols";
      grid-template-columns: 280px 1fr;
      grid-template-rows: 60px 1fr;
    }

    input[type="number"], select {
      width: 100%;
      height: 38px;
      background-color: var(--bg-dark);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      border-radius: 6px;
      padding: 0 10px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="number"]:focus, select:focus {
      border-color: var(--accent-gold);
    }

    .advisor-btn {
      background-color: var(--accent-gold);
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .advisor-btn:hover {
      background-color: var(--accent-gold-hover);
    }

    .advisor-btn:active {
      transform: scale(0.98);
    }

    header.sketch-header {
      grid-area: header;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 2px solid var(--panel-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    aside.sketch-sidebar {
      grid-area: sidebar;
      border-right: 2px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 15px;
      background: var(--bg-dark);
      overflow-y: auto;
    }

    .input-label-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-label-group label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--panel-bg);
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      max-height: 220px;
      overflow-y: auto;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-main);
    }

    .checkbox-item input[type="checkbox"] {
      accent-color: var(--accent-gold);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    #runBtn { 
      width: 100%;
      height: 42px;
      margin-top: 10px;
      font-size: 1rem;
    }

    main.sketch-main-cols {
      grid-area: main-cols;
      display: flex;
      flex-direction: column;
      padding: 24px;
      height: calc(100vh - 60px);
      overflow: hidden;
    }

    .scrollable-cards-container {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding-right: 12px;
      overflow-y: auto;
    }

    .scrollable-cards-container::-webkit-scrollbar,
    .checkbox-group::-webkit-scrollbar {
      width: 8px;
    }
    .scrollable-cards-container::-webkit-scrollbar-track,
    .checkbox-group::-webkit-scrollbar-track {
      background: var(--bg-dark);
      border-radius: 6px;
    }
    .scrollable-cards-container::-webkit-scrollbar-thumb,
    .checkbox-group::-webkit-scrollbar-thumb {
      background: var(--panel-border);
      border-radius: 6px;
    }
    .scrollable-cards-container::-webkit-scrollbar-thumb:hover {
      background: var(--accent-gold);
    }

    .data-col {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.6);
      padding: 20px;
      position: relative;
      height: fit-content;
      margin-top: 10px;
    }

    .col-label {
      position: absolute;
      top: -14px;
      left: 15px;
      background: var(--panel-bg);
      padding: 0 10px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent-gold);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
    }

    .data-display-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed var(--panel-border);
      padding: 8px 0;
      font-size: 14px;
    }

    .data-display-item:last-child {
      border-bottom: none;
    }

    .profit-positive { color: var(--accent-green); }
    .profit-negative { color: var(--accent-red); }

    .retry-area {
      display: flex;
      justify-content: flex-start;
      padding-top: 15px;
      border-top: 1px solid var(--panel-border);
      margin-top: 10px;
    }

    #retryBtn {
      width: 140px;
      height: 42px;
      font-size: 0.95rem;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="wireframe-container">
    
    <header class="sketch-header">
      ⚔️ Albion Advisor — Market & Trade Route Assistant
    </header>

    <aside class="sketch-sidebar">
      <div class="input-label-group">
        <label for="budget">Budget (Silver):</label>
        <input type="number" id="budget" name="budget" value="1000000" oninput="calculateAdvisor();">
      </div>

      <!-- Premium Status Dropdown -->
      <div class="input-label-group">
        <label for="hasPremium">Premium Status:</label>
        <select id="hasPremium" onchange="calculateAdvisor();">
          <option value="true" selected>Active Premium (4% Tax)</option>
          <option value="false">No Premium (8% Tax)</option>
        </select>
      </div>

      <div class="input-label-group">
        <label>Blacklist Locations (Multiple):</label>
        <div class="checkbox-group" id="blacklistContainer">
          <label class="checkbox-item"><input type="checkbox" value="Caerleon" onchange="calculateAdvisor()"> Caerleon</label>
          <label class="checkbox-item"><input type="checkbox" value="Black Market" onchange="calculateAdvisor()"> Black Market</label>
          <label class="checkbox-item"><input type="checkbox" value="Bridgewatch" onchange="calculateAdvisor()"> Bridgewatch</label>
          <label class="checkbox-item"><input type="checkbox" value="Fort Sterling" onchange="calculateAdvisor()"> Fort Sterling</label>
          <label class="checkbox-item"><input type="checkbox" value="Lymhurst" onchange="calculateAdvisor()"> Lymhurst</label>
          <label class="checkbox-item"><input type="checkbox" value="Martlock" onchange="calculateAdvisor()"> Martlock</label>
          <label class="checkbox-item"><input type="checkbox" value="Thetford" onchange="calculateAdvisor()"> Thetford</label>
          <label class="checkbox-item"><input type="checkbox" value="Brecilien" onchange="calculateAdvisor()"> Brecilien</label>
        </div>
      </div>

      <button id="runBtn" class="advisor-btn" onclick="calculateAdvisor();">RUN</button>
    </aside>

    <main class="sketch-main-cols">
      <div class="scrollable-cards-container" id="cardsWrapper"></div>

      <div class="retry-area">
        <button id="retryBtn" class="advisor-btn" onclick="calculateAdvisor();">RETRY</button>
      </div>
    </main>
  </div>

  <script>
    const masterRoutesData = [
      { itemName: "T6.1 Claws", from: "Caerleon", to: "Martlock", buy: 22000, sell: 31000, availableBandQty: 45 },
      { itemName: "T8 Grandmaster Bag", from: "Lymhurst", to: "Black Market", buy: 150000, sell: 195000, availableBandQty: 8 },
      { itemName: "T7 Swiftclaw", from: "Bridgewatch", to: "Fort Sterling", buy: 120000, sell: 142000, availableBandQty: 15 },
      { itemName: "T8.3 Royal Jacket", from: "Brecilien", to: "Caerleon", buy: 1200000, sell: 1480000, availableBandQty: 2 },
      { itemName: "T5 Poison Potion", from: "Martlock", to: "Lymhurst", buy: 1200, sell: 1750, availableBandQty: 850 },
      { itemName: "T6 Bloodletter", from: "Fort Sterling", to: "Black Market", buy: 45000, sell: 62000, availableBandQty: 22 },
      { itemName: "T7 Pork Omelette", from: "Thetford", to: "Brecilien", buy: 3400, sell: 4900, availableBandQty: 300 }
    ];

    function toRoman(num) {
      const lookup = { M:1000, CM:900, D:500, CD:400, C:100, XC:90, L:50, XL:40, X:10, IX:9, V:5, IV:4, I:1 };
      let roman = '';
      for (let i in lookup) {
        while (num >= lookup[i]) {
          roman += i;
          num -= lookup[i];
        }
      }
      return roman;
    }

    function calculateAdvisor() {
      const budgetVal = parseFloat(document.getElementById('budget').value) || 0;
      const isPremium = document.getElementById('hasPremium').value === 'true';
      
      const checkedBoxes = document.querySelectorAll('#blacklistContainer input[type="checkbox"]:checked');
      const blacklistedCities = Array.from(checkedBoxes).map(cb => cb.value);

      const validRoutes = masterRoutesData.filter(route => {
        return !blacklistedCities.includes(route.from) && !blacklistedCities.includes(route.to);
      });

      const cardsWrapper = document.getElementById('cardsWrapper');
      cardsWrapper.innerHTML = ''; 

      if (validRoutes.length === 0) {
        cardsWrapper.innerHTML = `<div class="empty-state">No trade routes found matching your criteria. Try unchecking some blacklisted cities!</div>`;
        return;
      }

      const setupFeeRate = 0.025;
      // Tax rate set based on Premium status: 4% for Premium, 8% for Non-Premium
      const salesTaxRate = isPremium ? 0.04 : 0.08;

      validRoutes.forEach((route, index) => {
        const romanNum = toRoman(index + 1);
        
        const effectiveAvgBuy = route.buy;
        const maxAffordableQty = Math.floor(budgetVal / (effectiveAvgBuy * (1 + setupFeeRate)));
        const qtyToBuy = Math.min(maxAffordableQty, route.availableBandQty);

        let netProfit = 0;
        let profitPerUnit = 0;
        let profitClass = 'profit-negative';
        let profitText = '0 Silver';

        if (qtyToBuy > 0) {
          const totalBuyCost = effectiveAvgBuy * (1 + setupFeeRate) * qtyToBuy;
          const totalSellGross = route.sell * qtyToBuy;
          const setupFees = (route.sell * setupFeeRate * qtyToBuy); 
          const salesTax = totalSellGross * salesTaxRate;

          netProfit = totalSellGross - totalBuyCost - setupFees - salesTax;
          profitPerUnit = netProfit / qtyToBuy;
          profitClass = netProfit >= 0 ? 'profit-positive' : 'profit-negative';
          profitText = Math.round(netProfit).toLocaleString() + ' Silver';
        } else if (budgetVal > 0) {
          profitText = 'Low Budget';
        }

        const cardHTML = `
          <div class="data-col">
            <div class="col-label">${romanNum}</div>
            <div class="data-display-item" style="margin-top: 8px;">
              <span>item name:</span>
              <strong style="color: var(--accent-gold);">${route.itemName}</strong>
            </div>
            <div class="data-display-item">
              <span>Route:</span>
              <span>from <strong style="color: var(--accent-gold);">${route.from}</strong> ➔ <strong style="color: var(--accent-gold);">${route.to}</strong></span>
            </div>
            <div class="data-display-item"><span>Profit:</span><strong class="${profitClass}">${profitText}</strong></div>
            <div class="data-display-item"><span>Buy Price:</span><strong>${route.buy.toLocaleString()} Silver</strong></div>
            <div class="data-display-item"><span>Sell Price:</span><strong>${route.sell.toLocaleString()} Silver</strong></div>
            <div class="data-display-item"><span>Quantity:</span><strong style="color: var(--accent-gold);">${qtyToBuy.toLocaleString()} / ${route.availableBandQty}</strong></div>
            <div class="data-display-item"><span>Profit per item:</span><strong>${Math.round(profitPerUnit).toLocaleString()} Silver</strong></div>
          </div>
        `;

        cardsWrapper.innerHTML += cardHTML;
      });
    }

    const budgetInput = document.getElementById('budget');
    budgetInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey || e.metaKey) return;
      if ([8, 9, 27, 13, 110, 190].indexOf(e.keyCode) !== -1 ||
          (e.keyCode >= 35 && e.keyCode <= 39) ||
          (e.keyCode >= 48 && e.keyCode <= 57) ||
          (e.keyCode >= 96 && e.keyCode <= 105)) {
        return;
      }
      e.preventDefault();
    });

    calculateAdvisor();
  </script>
</body>
</html>
