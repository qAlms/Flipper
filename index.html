<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Advisor - Custom Layout</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --panel-bg: #1e293b;
      --panel-border: #334155;
      --accent-gold: #f59e0b;
      --accent-gold-hover: #d97706;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Main Container - Adjusted to scale nicely across the entire page */
    .wireframe-container {
      width: 100%;
      max-width: 1200px;
      min-height: 85vh;
      border: 2px solid var(--panel-border);
      border-radius: 12px;
      background-color: var(--panel-bg);
      display: grid;
      grid-template-areas: 
        "header header header"
        "sidebar main-cols main-cols";
      grid-template-columns: 240px 1fr 1fr;
      grid-template-rows: 60px 1fr;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Form Controls */
    input[type="number"], select {
      width: 100%;
      height: 38px;
      background-color: var(--bg-dark);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      border-radius: 6px;
      padding: 0 10px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="number"]:focus, select:focus {
      border-color: var(--accent-gold);
    }

    .advisor-btn {
      background-color: var(--accent-gold);
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .advisor-btn:hover {
      background-color: var(--accent-gold-hover);
    }

    .advisor-btn:active {
      transform: scale(0.98);
    }

    /* Header */
    header.sketch-header {
      grid-area: header;
      background: rgba(15, 23, 42, 0.6);
      border-bottom: 2px solid var(--panel-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    /* Sidebar Layout - Clean flexbox stack so elements don't overlap */
    aside.sketch-sidebar {
      grid-area: sidebar;
      border-right: 2px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px 15px;
      background: var(--bg-dark);
    }

    .input-label-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-label-group label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Standardized button placement within flexbox flow */
    #runBtn { 
      width: 100%;
      height: 42px;
      margin-top: 10px;
      font-size: 1rem;
    }

    /* Main Display Columns Area */
    main.sketch-main-cols {
      grid-area: main-cols;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      gap: 20px;
    }

    .columns-wrapper {
      display: flex;
      gap: 20px;
      flex: 1;
    }

    .data-col {
      flex: 1;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.5);
      padding: 20px;
      position: relative;
    }

    .col-label {
      position: absolute;
      top: -14px;
      left: 15px;
      background: var(--panel-bg);
      padding: 0 8px;
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-gold);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
    }

    /* Dynamic Data Row Items */
    .data-display-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed var(--panel-border);
      padding: 12px 0;
      font-size: 14px;
    }

    .data-display-item:last-child {
      border-bottom: none;
    }

    .profit-positive { color: var(--accent-green); }
    .profit-negative { color: var(--accent-red); }

    /* Bottom area for Retry button */
    .retry-area {
      display: flex;
      justify-content: flex-start;
      padding-top: 10px;
    }

    #retryBtn {
      width: 140px;
      height: 45px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="wireframe-container">
    
    <header class="sketch-header">
      ⚔️ Albion Advisor — Market & Trade Route Assistant
    </header>

    <!-- Sidebar Control Panel -->
    <aside class="sketch-sidebar">
      
      <!-- Budget Input -->
      <div class="input-label-group">
        <label for="budget">Budget (Silver):</label>
        <input type="number" id="budget" name="budget" placeholder="0" value="1000000" oninput="calculateAdvisor();">
      </div>

      <!-- Whitelist Cities Select -->
      <div class="input-label-group">
        <label for="whitelist">City Whitelist:</label>
        <select id="whitelist" name="whitelist" onchange="calculateAdvisor();">
          <option value="all">All Cities</option>
          <option value="Caerleon">Caerleon</option>
          <option value="Bridgewatch">Bridgewatch</option>
          <option value="Fort Sterling">Fort Sterling</option>
          <option value="Lymhurst">Lymhurst</option>
          <option value="Martlock">Martlock</option>
          <option value="Thetford">Thetford</option>
          <option value="Brecilien">Brecilien</option>
        </select>
      </div>

      <!-- Blacklist Cities Select -->
      <div class="input-label-group">
        <label for="blacklist">City Blacklist:</label>
        <select id="blacklist" name="blacklist" onchange="calculateAdvisor();">
          <option value="none">None</option>
          <option value="Caerleon">Caerleon</option>
          <option value="Bridgewatch">Bridgewatch</option>
          <option value="Fort Sterling">Fort Sterling</option>
          <option value="Lymhurst">Lymhurst</option>
          <option value="Martlock">Martlock</option>
          <option value="Thetford">Thetford</option>
          <option value="Brecilien">Brecilien</option>
        </select>
      </div>

      <!-- Run Button -->
      <button id="runBtn" class="advisor-btn" onclick="calculateAdvisor();">RUN</button>

    </aside>

    <!-- Main Output Display -->
    <main class="sketch-main-cols">
      
      <div class="columns-wrapper">
        <!-- Column I -->
        <div class="data-col" id="colI">
          <div class="col-label">I</div>
          
          <div class="data-display-item" style="margin-top: 10px;">
            <span>Route:</span>
            <span>from <strong id="fromLocI" style="color: var(--accent-gold);">Caerleon</strong> ➔ <strong id="toLocI" style="color: var(--accent-gold);">Martlock</strong></span>
          </div>
          <div class="data-display-item">
            <span>Profit:</span><strong id="profitI" class="profit-positive">0 Silver</strong>
          </div>
          <div class="data-display-item">
            <span>Buy Price:</span><strong id="buyI">0</strong>
          </div>
          <div class="data-display-item">
            <span>Sell Price:</span><strong id="sellI">0</strong>
          </div>
          <div class="data-display-item">
            <span>Quantity:</span><strong id="qtyI">0</strong>
          </div>
          <div class="data-display-item">
            <span>Profit per item:</span><strong id="pPerQI">0</strong>
          </div>
        </div>

        <!-- Column II -->
        <div class="data-col" id="colII">
          <div class="col-label">II</div>
          
          <div class="data-display-item" style="margin-top: 10px;">
            <span>Route:</span>
            <span>from <strong id="fromLocII" style="color: var(--accent-gold);">Lymhurst</strong> ➔ <strong id="toLocII" style="color: var(--accent-gold);">Thetford</strong></span>
          </div>
          <div class="data-display-item">
            <span>Profit:</span><strong id="profitII" class="profit-positive">0 Silver</strong>
          </div>
          <div class="data-display-item">
            <span>Buy Price:</span><strong id="buyII">0</strong>
          </div>
          <div class="data-display-item">
            <span>Sell Price:</span><strong id="sellII">0</strong>
          </div>
          <div class="data-display-item">
            <span>Quantity:</span><strong id="qtyII">0</strong>
          </div>
          <div class="data-display-item">
            <span>Profit per item:</span><strong id="pPerQII">0</strong>
          </div>
        </div>
      </div>

      <!-- Retry Action Area -->
      <div class="retry-area">
        <button id="retryBtn" class="advisor-btn" onclick="calculateAdvisor();">RETRY</button>
      </div>

    </main>
  </div>

  <script>
    function calculateAdvisor() {
      const budgetVal = parseFloat(document.getElementById('budget').value) || 0;
      const whitelistCity = document.getElementById('whitelist').value;
      const blacklistCity = document.getElementById('blacklist').value;
      
      const routes = [
        { from: "Caerleon", to: "Martlock", buy: 2000, sell: 2800 },
        { from: "Lymhurst", to: "Thetford", buy: 1500, sell: 2150 }
      ];

      function updateCol(colId, routeData) {
        let fromCity = routeData.from;
        let toCity = routeData.to;

        // Apply Whitelist / Blacklist visual override logic for display
        if (whitelistCity !== 'all') {
          fromCity = whitelistCity;
        }
        if (blacklistCity !== 'none' && fromCity === blacklistCity) {
          fromCity = "Fort Sterling"; // Fallback if blacklisted
        }

        document.getElementById('fromLoc' + colId).innerText = fromCity;
        document.getElementById('toLoc' + colId).innerText = toCity;

        if (budgetVal <= 0) {
          document.getElementById('profit' + colId).innerText = '0 Silver';
          document.getElementById('profit' + colId).className = 'profit-negative';
          document.getElementById('buy' + colId).innerText = '0';
          document.getElementById('sell' + colId).innerText = '0';
          document.getElementById('qty' + colId).innerText = '0';
          document.getElementById('pPerQ' + colId).innerText = '0';
          return;
        }

        const setupFeeRate = 0.025;
        const salesTaxRate = 0.04;
        
        const qtyToBuy = Math.floor(budgetVal / (routeData.buy * (1 + setupFeeRate)));
        
        if (qtyToBuy <= 0) {
          document.getElementById('profit' + colId).innerText = 'Low Budget';
          document.getElementById('profit' + colId).className = 'profit-negative';
          return;
        }

        const totalBuyCost = routeData.buy * (1 + setupFeeRate) * qtyToBuy;
        const totalSellGross = routeData.sell * qtyToBuy;
        const setupFees = (routeData.sell * setupFeeRate * qtyToBuy); 
        const salesTax = totalSellGross * salesTaxRate;

        const netProfit = totalSellGross - totalBuyCost - setupFees - salesTax;
        const profitPerUnit = netProfit / qtyToBuy;

        const profitEl = document.getElementById('profit' + colId);
        profitEl.innerText = Math.round(netProfit).toLocaleString() + ' Silver';
        profitEl.className = netProfit >= 0 ? 'profit-positive' : 'profit-negative';

        document.getElementById('buy' + colId).innerText = routeData.buy.toLocaleString() + ' Silver';
        document.getElementById('sell' + colId).innerText = routeData.sell.toLocaleString() + ' Silver';
        document.getElementById('qty' + colId).innerText = qtyToBuy.toLocaleString();
        document.getElementById('pPerQ' + colId).innerText = Math.round(profitPerUnit).toLocaleString() + ' Silver';
      }

      updateCol('I', routes[0]);
      updateCol('II', routes[1]);
    }

    // Strict numerical input filter for budget
    const budgetInput = document.getElementById('budget');
    budgetInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey || e.metaKey) return;
      if ([8, 9, 27, 13, 110, 190].indexOf(e.keyCode) !== -1 ||
          (e.keyCode >= 35 && e.keyCode <= 39) ||
          (e.keyCode >= 48 && e.keyCode <= 57) ||
          (e.keyCode >= 96 && e.keyCode <= 105)) {
        return;
      }
      e.preventDefault();
    });

    calculateAdvisor();
  </script>
</body>
</html>
