<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Helper</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --panel-bg: #1e293b;
      --panel-border: #334155;
      --accent-gold: #f59e0b;
      --accent-gold-hover: #d97706;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;

      /* City Specific Toggle Colors */
      --color-fort-sterling: #94a3b8;
      --color-lymhurst: #4ade80;
      --color-bridgewatch: #f97316;
      --color-martlock: #3b82f6;
      --color-thetford: #a855f7;
      --color-caerleon: #ef4444;
      --color-brecilien: #06b6d4;
      --color-black-market: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-dark);
      color: var(--text-main);
    }

    .wireframe-container {
      width: 100vw;
      height: 100vh;
      background-color: var(--panel-bg);
      display: grid;
      grid-template-areas: 
        "header header"
        "sidebar main-cols";
      grid-template-columns: 320px 1fr;
      grid-template-rows: 60px 1fr;
    }

    input[type="number"], select {
      width: 100%;
      height: 38px;
      background-color: var(--bg-dark);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      border-radius: 6px;
      padding: 0 10px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="number"]:focus, select:focus {
      border-color: var(--accent-gold);
    }

    .advisor-btn {
      background-color: var(--accent-gold);
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .advisor-btn:hover {
      background-color: var(--accent-gold-hover);
    }

    .advisor-btn:active {
      transform: scale(0.98);
    }

    header.sketch-header {
      grid-area: header;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 2px solid var(--panel-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    aside.sketch-sidebar {
      grid-area: sidebar;
      border-right: 2px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 15px;
      background: var(--bg-dark);
      overflow-y: auto;
    }

    .input-label-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label-group label.group-title {
      font-size: 0.9rem;
      color: var(--text-main);
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Custom Toggle Switch Styling */
    .toggle-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--panel-bg);
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
    }

    .toggle-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      color: var(--text-main);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334155;
      transition: .2s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    /* Generic Blue Active Toggle */
    input:checked + .slider {
      background-color: var(--accent-blue);
    }

    input:checked + .slider:before {
      transform: translateX(16px);
    }

    /* City Specific Active Colors */
    input[data-city="Fort Sterling"]:checked + .slider { background-color: var(--color-fort-sterling); }
    input[data-city="Lymhurst"]:checked + .slider { background-color: var(--color-lymhurst); }
    input[data-city="Bridgewatch"]:checked + .slider { background-color: var(--color-bridgewatch); }
    input[data-city="Martlock"]:checked + .slider { background-color: var(--color-martlock); }
    input[data-city="Thetford"]:checked + .slider { background-color: var(--color-thetford); }
    input[data-city="Caerleon"]:checked + .slider { background-color: var(--color-caerleon); }
    input[data-city="Brecilien"]:checked + .slider { background-color: var(--color-brecilien); }
    input[data-city="Black Market"]:checked + .slider { background-color: var(--color-black-market); }

    #runBtn { 
      width: 100%;
      height: 42px;
      margin-top: 10px;
      font-size: 1rem;
    }

    main.sketch-main-cols {
      grid-area: main-cols;
      display: flex;
      flex-direction: column;
      padding: 24px;
      height: calc(100vh - 60px);
      overflow: hidden;
    }

    .scrollable-cards-container {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding-right: 12px;
      overflow-y: auto;
    }

    .scrollable-cards-container::-webkit-scrollbar,
    aside.sketch-sidebar::-webkit-scrollbar {
      width: 8px;
    }
    .scrollable-cards-container::-webkit-scrollbar-track,
    aside.sketch-sidebar::-webkit-scrollbar-track {
      background: var(--bg-dark);
      border-radius: 6px;
    }
    .scrollable-cards-container::-webkit-scrollbar-thumb,
    aside.sketch-sidebar::-webkit-scrollbar-thumb {
      background: var(--panel-border);
      border-radius: 6px;
    }
    .scrollable-cards-container::-webkit-scrollbar-thumb:hover,
    aside.sketch-sidebar::-webkit-scrollbar-thumb:hover {
      background: var(--accent-gold);
    }

    .data-col {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.6);
      padding: 20px;
      position: relative;
      height: fit-content;
      margin-top: 10px;
    }

    .col-label {
      position: absolute;
      top: -14px;
      left: 15px;
      background: var(--panel-bg);
      padding: 0 10px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent-gold);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
    }

    .data-display-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed var(--panel-border);
      padding: 8px 0;
      font-size: 14px;
    }

    .data-display-item:last-child {
      border-bottom: none;
    }

    .profit-positive { color: var(--accent-green); }
    .profit-negative { color: var(--accent-red); }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="wireframe-container">
    
    <header class="sketch-header">
      Albion Helper
    </header>

    <aside class="sketch-sidebar">
      <div class="input-label-group">
        <label for="budget" class="group-title">Budget (Silver):</label>
        <input type="number" id="budget" name="budget" value="1000000" oninput="calculateAdvisor();">
      </div>

      <!-- Premium Status Dropdown -->
      <div class="input-label-group">
        <label for="hasPremium" class="group-title">Premium Status:</label>
        <select id="hasPremium" onchange="calculateAdvisor();">
          <option value="true" selected>Active Premium (4% Tax)</option>
          <option value="false">No Premium (8% Tax)</option>
        </select>
      </div>

      <!-- Locations Toggle Group -->
      <div class="input-label-group">
        <label class="group-title">Locations</label>
        <div class="toggle-list" id="locationToggles">
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Fort Sterling" data-city="Fort Sterling" onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Fort Sterling
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Lymhurst" data-city="Lymhurst" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Lymhurst
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Bridgewatch" data-city="Bridgewatch" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Bridgewatch
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Martlock" data-city="Martlock" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Martlock
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Thetford" data-city="Thetford" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Thetford
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Caerleon" data-city="Caerleon" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Caerleon
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Brecilien" data-city="Brecilien" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Brecilien
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Black Market" data-city="Black Market" onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Black Market
          </label>
        </div>
      </div>

      <!-- Qualities Toggle Group -->
      <div class="input-label-group">
        <label class="group-title">Qualities</label>
        <div class="toggle-list" id="qualityToggles">
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Normal" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Normal
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Good" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Good
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Outstanding" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Outstanding
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Excellent" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Excellent
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="Masterpiece" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            Masterpiece
          </label>
        </div>
      </div>

      <!-- Tier Toggle Group -->
      <div class="input-label-group">
        <label class="group-title">Tier</label>
        <div class="toggle-list" id="tierToggles">
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="T4" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            T4
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="T5" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            T5
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="T6" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            T6
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="T7" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            T7
          </label>
          <label class="toggle-item">
            <span class="switch"><input type="checkbox" value="T8" checked onchange="calculateAdvisor()"> <span class="slider"></span></span>
            T8
          </label>
        </div>
      </div>

      <button id="runBtn" class="advisor-btn" onclick="calculateAdvisor();">RUN</button>
    </aside>

    <main class="sketch-main-cols">
      <div class="scrollable-cards-container" id="cardsWrapper"></div>
    </main>
  </div>

  <script>
    // Expanded master dataset with Tier and Quality properties
    const masterRoutesData = [
      { itemName: "T6.1 Claws", tier: "T6", quality: "Normal", from: "Caerleon", to: "Martlock", buy: 22000, sell: 31000, availableBandQty: 45 },
      { itemName: "T8 Grandmaster Bag", tier: "T8", quality: "Good", from: "Lymhurst", to: "Black Market", buy: 150000, sell: 195000, availableBandQty: 8 },
      { itemName: "T7 Swiftclaw", tier: "T7", quality: "Outstanding", from: "Bridgewatch", to: "Fort Sterling", buy: 120000, sell: 142000, availableBandQty: 15 },
      { itemName: "T8.3 Royal Jacket", tier: "T8", quality: "Masterpiece", from: "Brecilien", to: "Caerleon", buy: 1200000, sell: 1480000, availableBandQty: 2 },
      { itemName: "T5 Poison Potion", tier: "T5", quality: "Normal", from: "Martlock", to: "Lymhurst", buy: 1200, sell: 1750, availableBandQty: 850 },
      { itemName: "T6 Bloodletter", tier: "T6", quality: "Excellent", from: "Fort Sterling", to: "Black Market", buy: 45000, sell: 62000, availableBandQty: 22 },
      { itemName: "T7 Pork Omelette", tier: "T7", quality: "Normal", from: "Thetford", to: "Brecilien", buy: 3400, sell: 4900, availableBandQty: 300 },
      { itemName: "T4 Scholar Robe", tier: "T4", quality: "Good", from: "Bridgewatch", to: "Thetford", buy: 8000, sell: 12500, availableBandQty: 50 }
    ];

    function toRoman(num) {
      const lookup = { M:1000, CM:900, D:500, CD:400, C:100, XC:90, L:50, XL:40, X:10, IX:9, V:5, IV:4, I:1 };
      let roman = '';
      for (let i in lookup) {
        while (num >= lookup[i]) {
          roman += i;
          num -= lookup[i];
        }
      }
      return roman;
    }

    function calculateAdvisor() {
      const budgetVal = parseFloat(document.getElementById('budget').value) || 0;
      const isPremium = document.getElementById('hasPremium').value === 'true';
      
      // Get active location toggles
      const activeLocationInputs = document.querySelectorAll('#locationToggles input[type="checkbox"]:checked');
      const activeLocations = Array.from(activeLocationInputs).map(cb => cb.value);

      // Get active quality toggles
      const activeQualityInputs = document.querySelectorAll('#qualityToggles input[type="checkbox"]:checked');
      const activeQualities = Array.from(activeQualityInputs).map(cb => cb.value);

      // Get active tier toggles
      const activeTierInputs = document.querySelectorAll('#tierToggles input[type="checkbox"]:checked');
      const activeTiers = Array.from(activeTierInputs).map(cb => cb.value);

      // Both origin AND destination must be in active locations list
      const validRoutes = masterRoutesData.filter(route => {
        const isLocationValid = activeLocations.includes(route.from) && activeLocations.includes(route.to);
        const isQualityValid = activeQualities.includes(route.quality);
        const isTierValid = activeTiers.includes(route.tier);
        return isLocationValid && isQualityValid && isTierValid;
      });

      const cardsWrapper = document.getElementById('cardsWrapper');
      cardsWrapper.innerHTML = ''; 

      if (validRoutes.length === 0) {
        cardsWrapper.innerHTML = `<div class="empty-state">No trade routes found matching your criteria. Try enabling more locations, qualities, or tiers!</div>`;
        return;
      }

      const setupFeeRate = 0.025;
      const salesTaxRate = isPremium ? 0.04 : 0.08;

      validRoutes.forEach((route, index) => {
        const romanNum = toRoman(index + 1);
        
        const effectiveAvgBuy = route.buy;
        const maxAffordableQty = Math.floor(budgetVal / (effectiveAvgBuy * (1 + setupFeeRate)));
        const qtyToBuy = Math.min(maxAffordableQty, route.availableBandQty);

        let netProfit = 0;
        let profitPerUnit = 0;
        let profitClass = 'profit-negative';
        let profitText = '0 Silver';

        if (qtyToBuy > 0) {
          const totalBuyCost = effectiveAvgBuy * (1 + setupFeeRate) * qtyToBuy;
          const totalSellGross = route.sell * qtyToBuy;
          const setupFees = (route.sell * setupFeeRate * qtyToBuy); 
          const salesTax = totalSellGross * salesTaxRate;

          netProfit = totalSellGross - totalBuyCost - setupFees - salesTax;
          profitPerUnit = netProfit / qtyToBuy;
          profitClass = netProfit >= 0 ? 'profit-positive' : 'profit-negative';
          profitText = Math.round(netProfit).toLocaleString() + ' Silver';
        } else if (budgetVal > 0) {
          profitText = 'Low Budget';
        }

        const cardHTML = `
          <div class="data-col">
            <div class="col-label">${romanNum}</div>
            <div class="data-display-item" style="margin-top: 8px;">
              <span>item name:</span>
              <strong style="color: var(--accent-gold);">${route.itemName}</strong>
            </div>
            <div class="data-display-item">
              <span>Route:</span>
              <span>from <strong style="color: var(--accent-gold);">${route.from}</strong> ➔ <strong style="color: var(--accent-gold);">${route.to}</strong></span>
            </div>
            <div class="data-display-item"><span>Profit:</span><strong class="${profitClass}">${profitText}</strong></div>
            <div class="data-display-item"><span>Buy Price:</span><strong>${route.buy.toLocaleString()} Silver</strong></div>
            <div class="data-display-item"><span>Sell Price:</span><strong>${route.sell.toLocaleString()} Silver</strong></div>
            <div class="data-display-item"><span>Quantity:</span><strong style="color: var(--accent-gold);">${qtyToBuy.toLocaleString()} / ${route.availableBandQty}</strong></div>
            <div class="data-display-item"><span>Profit per item:</span><strong>${Math.round(profitPerUnit).toLocaleString()} Silver</strong></div>
          </div>
        `;

        cardsWrapper.innerHTML += cardHTML;
      });
    }

    const budgetInput = document.getElementById('budget');
    budgetInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey || e.metaKey) return;
      if ([8, 9, 27, 13, 110, 190].indexOf(e.keyCode) !== -1 ||
          (e.keyCode >= 35 && e.keyCode <= 39) ||
          (e.keyCode >= 48 && e.keyCode <= 57) ||
          (e.keyCode >= 96 && e.keyCode <= 105)) {
        return;
      }
      e.preventDefault();
    });

    calculateAdvisor();
  </script>
</body>
</html>
