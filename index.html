<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Advisor - Functional Wireframe Replica</title>
  <style>
    /* Albion Advisor Dark/Gold Color Scheme - Preserved from our first code */
    :root {
      --bg-dark: #0f172a;
      --panel-bg: #1e293b;
      --panel-border: #334155;
      --accent-gold: #f59e0b;
      --accent-gold-hover: #d97706;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding: 24px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Sketch Wireframe Layout Structure - image_0.png */
    .wireframe-container {
      width: 1000px;
      height: 700px; /* Force the specific aspect from your sketch */
      border: 3px solid var(--text-main); /* Outer wireframe boundary from image_0.png */
      border-radius: 10px;
      background-color: #ffffff11; /* Slight transparent fill for wireframe feel */
      display: grid;
      grid-template-areas: 
        "header header header"
        "sidebar main-cols main-cols"
        "sidebar retry-area retry-area";
      grid-template-columns: 200px 1fr 1fr;
      grid-template-rows: 60px 1fr 60px; /* Adjusting height for "retry" row */
      position: relative; /* For absolutely positioned elements */
    }

    /* --- Universal Elements --- */
    input[type="number"], select {
      background-color: var(--bg-dark);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      border-radius: 4px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="number"]:focus, select:focus {
      border-color: var(--accent-gold);
    }

    .advisor-btn {
      background-color: var(--accent-gold);
      color: #0f172a;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .advisor-btn:hover {
      background-color: var(--accent-gold-hover);
    }

    /* --- Structure Elements from Sketch --- */
    
    header.sketch-header {
      grid-area: header;
      background: var(--panel-bg);
      border-bottom: 2px solid var(--text-main);
      display: flex;
      align-items: center;
      padding: 0 15px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    aside.sketch-sidebar {
      grid-area: sidebar;
      border-right: 2px solid var(--text-main);
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding: 20px 15px;
    }

    /* Specifying exact positioning from image_0.png sketch */
    .input-label-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* Input size from sketch constraints */
    #budget { width: 100%; height: 35px; text-align: center;} 
    #whitelist, #blacklist { width: 100%; height: 35px; }
    
    /* Absolute size constraints for Run button from sketch */
    #runBtn { 
      position: absolute;
      top: 180px; /* Estimated top margin from run to top of sidebar in sketch */
      left: 30px; /* Estimated left margin from run in sketch */
      width: 70px;
      height: 40px;
    }

    main.sketch-main-cols {
      grid-area: main-cols;
      display: flex;
      gap: 15px;
      padding: 20px;
      position: relative; /* For retry button absolute alignment */
    }

    .data-col {
      flex: 1;
      border: 2px solid var(--text-main);
      border-radius: 5px;
      background: #00000033;
      padding: 15px;
      position: relative;
    }

    .col-label {
      position: absolute;
      top: -12px;
      left: 10px;
      background: var(--bg-dark);
      padding: 0 5px;
      font-size: 1.5rem;
      font-family: 'Times New Roman', serif; /* Matching sketch style for I/II */
    }

    /* Specifying retry button exactly where it is in image_0.png */
    .retry-alignment {
      position: absolute;
      bottom: -45px; /* Offset to align below the main data boxes as sketched */
      left: 15px;
    }

    #retryBtn {
      width: 120px;
      height: 60px;
    }

    /* Specific functional logic for Data Display in cols I/II */
    .data-display-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed var(--panel-border);
      padding: 8px 0;
      font-size: 14px;
    }

    .data-display-item strong {
      font-weight: 600;
    }

    .profit-positive { color: var(--accent-green); }
    .profit-negative { color: var(--accent-red); }

  </style>
</head>
<body>

  <!-- 
    The Wireframe Container. 
    Maintains the overall 1000x700px boundary from image_0.png.
  -->
  <div class="wireframe-container">
    
    <header class="sketch-header">
      Albion Advisor - Data Wireframe
    </header>

    <!-- Sidebar Layout, derived directly from image_0.png -->
    <aside class="sketch-sidebar">
      
      <!-- 'buget' Input: Confirmed number-only whitelist -->
      <div class="input-label-group">
        <label for="budget" style="font-size: 0.9rem;">Budget (Number only):</label>
        <input type="number" id="budget" name="budget" placeholder="0" value="1000000" oninput="calculateAdvisor();">
      </div>

      <!-- 'whitelist' Select: Choice Button -->
      <div class="input-label-group">
        <label for="whitelist" style="font-size: 0.9rem;">Whitelist (Choice):</label>
        <select id="whitelist" name="whitelist">
          <option value="all">All Tiers</option>
          <option value="t5">T5+ Only</option>
          <option value="enchantment1">Enchant. 1+</option>
        </select>
      </div>

      <!-- 'blacklist' Select: Choice Button -->
      <div class="input-label-group">
        <label for="blacklist" style="font-size: 0.9rem;">Blacklist (Choice):</label>
        <select id="blacklist" name="blacklist">
          <option value="none">None</option>
          <option value="noBooks">No Skill Books</option>
          <option value="lowProfits">Skip Low Profit</option>
        </select>
      </div>

      <!-- 'run' Button -->
      <button id="runBtn" class="advisor-btn" onclick="calculateAdvisor();">RUN</button>

    </aside>

    <!-- Main Data Area with absolute layout elements -->
    <main class="sketch-main-cols">
      
      <!-- Column I: Data Display -->
      <div class="data-col" id="colI">
        <div class="col-label">I</div>
        
        <div class="data-display-item">
          <span>from <strong id="fromLocI">Caerleon</strong> >>> <strong id="toLocI">Martlock</strong></span>
        </div>
        <div class="data-display-item">
          <span>Profit:</span><strong id="profitI" class="profit-positive">0</strong>
        </div>
        <div class="data-display-item">
          <span>Buy Price:</span><strong id="buyI">0</strong>
        </div>
        <div class="data-display-item">
          <span>Sell Price:</span><strong id="sellI">0</strong>
        </div>
        <div class="data-display-item">
          <span>Quantity:</span><strong id="qtyI">0</strong>
        </div>
        <div class="data-display-item">
          <span>Profit/Quantity:</span><strong id="pPerQI">0</strong>
        </div>
      </div>

      <!-- Column II: Data Display -->
      <div class="data-col" id="colII">
        <div class="col-label">II</div>
        
        <div class="data-display-item">
          <span>from <strong id="fromLocII">Lymhurst</strong> >>> <strong id="toLocII">Thetford</strong></span>
        </div>
        <div class="data-display-item">
          <span>Profit:</span><strong id="profitII" class="profit-positive">0</strong>
        </div>
        <div class="data-display-item">
          <span>Buy Price:</span><strong id="buyII">0</strong>
        </div>
        <div class="data-display-item">
          <span>Sell Price:</span><strong id="sellII">0</strong>
        </div>
        <div class="data-display-item">
          <span>Quantity:</span><strong id="qtyII">0</strong>
        </div>
        <div class="data-display-item">
          <span>Profit/Quantity:</span><strong id="pPerQII">0</strong>
        </div>
      </div>

      <!-- 'retry' Button: Specific absolute alignment below data columns -->
      <div class="retry-alignment">
        <button id="retryBtn" class="advisor-btn" onclick="calculateAdvisor();">RETRY</button>
      </div>

    </main>
  </div>

  <script>
    /*
      Advisor functional logic.
      This logic is preserved and adapts to the new wireframe data inputs.
    */
    function calculateAdvisor() {
      // Input capture
      const budgetVal = parseFloat(document.getElementById('budget').value) || 0;
      
      // Preset data simulation (as before)
      const mockFlippingData = [
        { buy: 2000, sell: 2800, name: "Item A" },
        { buy: 1500, sell: 1950, name: "Item B" },
        { buy: 500, sell: 950, name: "Item C" }
      ];

      function updateDataDisplay(colPrefix, itemIdx) {
        if (budgetVal === 0) {
          document.getElementById(colPrefix + 'Profit').innerText = '0 Silver';
          document.getElementById(colPrefix + 'Profit').className = 'profit-negative';
          // (Clear other fields... simplified for this example)
          return;
        }

        const dataItem = mockFlippingData[itemIdx % mockFlippingData.length];
        
        // Tax is always handled (preserved logic from previous code)
        const setupFeeRate = 0.025; // 2.5% market setup fee
        const salesTaxRate = 0.04; // Assume Premium for tax in this wireframe
        
        // Quantity derived directly from budget constraint
        const qtyToBuy = Math.floor(budgetVal / (dataItem.buy * (1 + setupFeeRate)));
        
        if (qtyToBuy === 0) {
          document.getElementById(colPrefix + 'Profit').innerText = 'Insufficient Funds';
          document.getElementById(colPrefix + 'Profit').className = 'profit-negative';
          return;
        }

        const totalBuyCost = dataItem.buy * (1 + setupFeeRate) * qtyToBuy;
        const totalSellGross = dataItem.sell * qtyToBuy;

        const setupFees = (dataItem.sell * setupFeeRate * qtyToBuy); // Only need sell fee here as we already added buy fee to totalBuyCost. Simplified comparison
        const salesTax = totalSellGross * salesTaxRate;

        const netProfit = totalSellGross - totalBuyCost - setupFees - salesTax;
        const profitPerUnit = netProfit / qtyToBuy;

        // UI Updates with correct alignment based on budget
        const profitEl = document.getElementById(colPrefix + 'Profit');
        profitEl.innerText = Math.round(netProfit).toLocaleString() + ' Silver';
        profitEl.className = netProfit >= 0 ? 'profit-positive' : 'profit-negative';

        document.getElementById(colPrefix + 'Buy').innerText = dataItem.buy.toLocaleString();
        document.getElementById(colPrefix + 'Sell').innerText = dataItem.sell.toLocaleString();
        document.getElementById(colPrefix + 'Qty').innerText = qtyToBuy.toLocaleString();
        document.getElementById(colPrefix + 'PPerQ').innerText = Math.round(profitPerUnit).toLocaleString();
      }

      // Update both columns
      updateDataDisplay('', 0); // Using the prefix for Col I (default)
      updateDataDisplay('I', 0); // Need to re-trigger for col prefix specificity 
      updateDataDisplay('II', 1); // Display second item in simulated data
    }

    // Explicitly enforce number-only whitelisting on 'buget' input
    // The browser <input type="number"> does 90% of this work.
    // Additional whitelisting to prevent paste/scientific notation if strict control is desired
    const budgetInput = document.getElementById('budget');
    budgetInput.addEventListener('keydown', function(event) {
        // Whitelist backspace, delete, tab, escape, enter, decimal, numbers
        if (event.ctrlKey || event.metaKey) return; // Allow paste/select
        if ([8, 9, 27, 13, 110, 190].indexOf(event.keyCode) !== -1 ||
            (event.keyCode >= 35 && event.keyCode <= 39) ||
            (event.keyCode >= 48 && event.keyCode <= 57) ||
            (event.keyCode >= 96 && event.keyCode <= 105)) {
            return;
        }
        event.preventDefault();
    });

    // Initial run
    calculateAdvisor();

  </script>
</body>
</html>
