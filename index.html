<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albion Helper</title>
  <style>
    :root {
      --bg-dark: #121824;
      --panel-bg: #1a2232;
      --panel-border: #2a3447;
      --accent-gold: #f59e0b;
      --accent-gold-hover: #d97706;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;

      /* City Specific Colors */
      --color-fort-sterling: #cbd5e1;
      --color-lymhurst: #4ade80;
      --color-bridgewatch: #f97316;
      --color-martlock: #3b82f6;
      --color-thetford: #a855f7;
      --color-caerleon: #ef4444;
      --color-brecilien: #06b6d4;
      --color-black-market: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header.sketch-header {
      background: #0f172a;
      border-bottom: 1px solid var(--panel-border);
      padding: 14px 24px;
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    /* Top Controls Area */
    .top-controls-bar {
      position: relative;
      z-index: 100;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--panel-border);
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .top-row-inputs {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-group label {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    input[type="number"], select {
      height: 36px;
      background-color: var(--bg-dark);
      border: 1px solid var(--panel-border);
      color: var(--text-main);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
    }

    .filter-section-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-group-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-right: 4px;
    }

    /* Horizontal Compact Toggles Fix */
    .toggle-inline-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
      background: rgba(15, 23, 42, 0.6);
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--panel-border);
      position: relative;
    }

    .toggle-inline-item:hover {
      border-color: var(--text-muted);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 28px;
      height: 16px;
      pointer-events: none;
    }

    .switch input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      pointer-events: auto;
      z-index: 2;
    }

    .slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334155;
      transition: .2s;
      border-radius: 20px;
      pointer-events: none;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 10px;
      width: 10px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--accent-blue); }
    input:checked + .slider:before { transform: translateX(12px); }

    /* City Specific Active Toggle Colors */
    input[data-city="Fort Sterling"]:checked + .slider { background-color: var(--color-fort-sterling); }
    input[data-city="Lymhurst"]:checked + .slider { background-color: var(--color-lymhurst); }
    input[data-city="Bridgewatch"]:checked + .slider { background-color: var(--color-bridgewatch); }
    input[data-city="Martlock"]:checked + .slider { background-color: var(--color-martlock); }
    input[data-city="Thetford"]:checked + .slider { background-color: var(--color-thetford); }
    input[data-city="Caerleon"]:checked + .slider { background-color: var(--color-caerleon); }
    input[data-city="Brecilien"]:checked + .slider { background-color: var(--color-brecilien); }
    input[data-city="Black Market"]:checked + .slider { background-color: var(--color-black-market); }

    .advisor-btn {
      background-color: var(--accent-gold);
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      padding: 0 24px;
      height: 36px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .advisor-btn:hover { background-color: var(--accent-gold-hover); }

    /* Main Content Area */
    main.main-content {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
    }

    .table-header {
      display: grid;
      grid-template-columns: 2.8fr 1.2fr 1.5fr 1.5fr 1.3fr 1fr;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 1px solid var(--panel-border);
      align-items: center;
    }

    .table-header > div:nth-child(n+2) {
      text-align: right;
    }

    .table-row {
      display: grid;
      grid-template-columns: 2.8fr 1.2fr 1.5fr 1.5fr 1.3fr 1fr;
      padding: 14px 16px;
      background-color: #161f2e;
      border-bottom: 1px solid #1e293b;
      align-items: center;
      font-size: 1rem;
      transition: background 0.15s;
    }

    .table-row:hover {
      background-color: #1e293b;
    }

    .item-title-container {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .item-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .item-subtext {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .badge-update {
      background: #142921;
      color: #4ade80;
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      margin-left: auto;
    }

    .badge-update::before {
      content: "";
      width: 7px;
      height: 7px;
      background-color: #4ade80;
      border-radius: 50%;
    }

    .price-cell {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }

    .city-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .city-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .price-val {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--text-main);
    }

    .profit-positive { color: var(--accent-green); font-weight: 700; font-size: 1.05rem; text-align: right; }
    .profit-negative { color: var(--accent-red); font-weight: 700; font-size: 1.05rem; text-align: right; }
    .margin-val { font-weight: 700; font-size: 1.05rem; color: var(--accent-green); text-align: right; }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <header class="sketch-header">
      Albion Helper
    </header>

    <!-- Top Filter Bar -->
    <div class="top-controls-bar">
      
      <div class="top-row-inputs">
        <div class="input-group">
          <label for="budget">Budget (Silver):</label>
          <input type="number" id="budget" value="5000000" style="width: 150px;">
        </div>

        <div class="input-group">
          <label for="minProfit">Min Profit:</label>
          <input type="number" id="minProfit" value="0" style="width: 130px;">
        </div>

        <div class="input-group">
          <label for="hasPremium">Premium:</label>
          <select id="hasPremium">
            <option value="true" selected>Active (4% Tax)</option>
            <option value="false">No Premium (8% Tax)</option>
          </select>
        </div>

        <div class="input-group">
          <label for="sortBy">Sort By:</label>
          <select id="sortBy">
            <option value="margin" selected>Profit Margin</option>
            <option value="name">Name</option>
            <option value="lastUpdate">Last Update</option>
          </select>
        </div>

        <button id="runBtn" class="advisor-btn">RUN</button>
      </div>

      <div class="filter-section-row">
        <!-- Locations -->
        <div class="filter-group" id="locationToggles">
          <span class="filter-group-title">Locations:</span>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Fort Sterling" data-city="Fort Sterling" checked><span class="slider"></span></span> Fort Sterling
          </label>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Lymhurst" data-city="Lymhurst" checked><span class="slider"></span></span> Lymhurst
          </label>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Bridgewatch" data-city="Bridgewatch" checked><span class="slider"></span></span> Bridgewatch
          </label>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Martlock" data-city="Martlock" checked><span class="slider"></span></span> Martlock
          </label>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Thetford" data-city="Thetford" checked><span class="slider"></span></span> Thetford
          </label>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Caerleon" data-city="Caerleon" checked><span class="slider"></span></span> Caerleon
          </label>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Brecilien" data-city="Brecilien" checked><span class="slider"></span></span> Brecilien
          </label>
          <label class="toggle-inline-item">
            <span class="switch"><input type="checkbox" value="Black Market" data-city="Black Market" checked><span class="slider"></span></span> Black Market
          </label>
        </div>
      </div>

      <div class="filter-section-row">
        <!-- Qualities -->
        <div class="filter-group" id="qualityToggles">
          <span class="filter-group-title">Qualities:</span>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="Normal" checked><span class="slider"></span></span> Normal</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="Good" checked><span class="slider"></span></span> Good</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="Outstanding" checked><span class="slider"></span></span> Outstanding</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="Excellent" checked><span class="slider"></span></span> Excellent</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="Masterpiece" checked><span class="slider"></span></span> Masterpiece</label>
        </div>

        <!-- Tiers -->
        <div class="filter-group" id="tierToggles">
          <span class="filter-group-title">Tier:</span>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="T4" checked><span class="slider"></span></span> T4</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="T5" checked><span class="slider"></span></span> T5</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="T6" checked><span class="slider"></span></span> T6</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="T7" checked><span class="slider"></span></span> T7</label>
          <label class="toggle-inline-item"><span class="switch"><input type="checkbox" value="T8" checked><span class="slider"></span></span> T8</label>
        </div>
      </div>

    </div>

    <!-- Table Header and Rows -->
    <main class="main-content">
      <div class="table-header">
        <div>Item Name</div>
        <div style="text-align: right;">Last Update</div>
        <div>Buy</div>
        <div>Sell</div>
        <div>Profit Per Item</div>
        <div>Profit Margin</div>
      </div>

      <div id="tableBody"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
